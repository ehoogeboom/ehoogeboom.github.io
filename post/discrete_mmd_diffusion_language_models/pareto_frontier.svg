<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Perplexity versus entropy Pareto frontier for diffusion language models</title>
  <desc id="desc">Scatter plot comparing generative perplexity and sample entropy on OpenWebText, highlighting D-MMD and the Pareto frontier.</desc>
